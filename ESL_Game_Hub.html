                        id: id++,

                        title: varTitle,

                            <p className={`font-medium ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                <i className="fas fa-filter mr-2"></i>
                                Showing {paginatedGames.length} of {filteredGames.length.toLocaleString()} games
                            </p>
                            <div className="flex items-center gap-2">
                                <span className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Per page:</span>
                                <select 
                                    value={gamesPerPage}
                                    onChange={(e) => setGamesPerPage(Number(e.target.value))}
                                    className={`px-3 py-1 rounded border ${
                                        darkMode ? 'bg-gray-700 border-gray-600 text-white' : 'bg-white border-gray-300'
                                    }`}
                                >
                                    <option value={10}>10</option>
                                    <option value={20}>20</option>
                                    <option value={50}>50</option>
                                    <option value={100}>100</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Games Grid */}
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {paginatedGames.map(game => (
                                <GameCard 
                                    key={game.id} 
                                    game={game} 
                                    darkMode={darkMode}
                                    onClick={() => setSelectedGame(game)}
                                />
                            ))}
                        </div>

                        {/* Empty State */}
                        {filteredGames.length === 0 && (
                            <div className={`text-center py-16 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                                <i className="fas fa-search text-6xl mb-4 opacity-50"></i>
                                <h3 className="text-2xl font-bold mb-2">No games found</h3>
                                <p>Try adjusting your search or filters</p>
                            </div>
                        )}

                        {/* Pagination */}
                        {totalPages > 1 && (
                            <div className="flex justify-center items-center gap-2 mt-8 pb-8">
                                <button
                                    onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                    disabled={currentPage === 1}
                                    className={`px-4 py-2 rounded-lg font-medium transition-colors ${
                                        currentPage === 1
                                            ? 'opacity-50 cursor-not-allowed'
                                            : darkMode 
                                                ? 'bg-gray-700 hover:bg-gray-600' 
                                                : 'bg-gray-200 hover:bg-gray-300'
                                    }`}
                                >
                                    <i className="fas fa-chevron-left mr-2"></i>Previous
                                </button>
                                
                                <div className="flex gap-1">
                                    {[...Array(Math.min(5, totalPages))].map((_, i) => {
                                        let pageNum;
                                        if (totalPages <= 5) {
                                            pageNum = i + 1;
                                        } else if (currentPage <= 3) {
                                            pageNum = i + 1;
                                        } else if (currentPage >= totalPages - 2) {
                                            pageNum = totalPages - 4 + i;
                                        } else {
                                            pageNum = currentPage - 2 + i;
                                        }
                                        
                                        return (
                                            <button
                                                key={pageNum}
                                                onClick={() => setCurrentPage(pageNum)}
                                                className={`w-10 h-10 rounded-lg font-medium transition-colors ${
                                                    currentPage === pageNum
                                                        ? 'bg-blue-600 text-white'
                                                        : darkMode 
                                                            ? 'bg-gray-700 hover:bg-gray-600' 
                                                            : 'bg-gray-200 hover:bg-gray-300'
                                                }`}
                                            >
                                                {pageNum}
                                            </button>
                                        );
                                    })}
                                </div>

                                <button
                                    onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                    disabled={currentPage === totalPages}
                                    className={`px-4 py-2 rounded-lg font-medium transition-colors ${
                                        currentPage === totalPages
                                            ? 'opacity-50 cursor-not-allowed'
                                            : darkMode 
                                                ? 'bg-gray-700 hover:bg-gray-600' 
                                                : 'bg-gray-200 hover:bg-gray-300'
                                    }`}
                                >
                                    Next<i className="fas fa-chevron-right ml-2"></i>
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Game Detail Modal */}
                    {selectedGame && (
                        <GameDetailModal 
                            game={selectedGame} 
                            darkMode={darkMode}
                            onClose={() => setSelectedGame(null)}
                        />
                    )}

                    {/* Offline Modal */}
                    {showOfflineModal && (
                        <OfflineModal 
                            darkMode={darkMode}
                            onClose={() => setShowOfflineModal(false)}
                            totalGames={ALL_GAMES.length}
                        />
                    )}
                </div>
            );
        }

        // Game Card Component
        function GameCard({ game, darkMode, onClick }) {
            const difficultyColors = {
                Easy: 'bg-green-100 text-green-800',
                Medium: 'bg-yellow-100 text-yellow-800',
                Hard: 'bg-red-100 text-red-800'
            };
            
            const difficultyDarkColors = {
                Easy: 'bg-green-900/30 text-green-400',
                Medium: 'bg-yellow-900/30 text-yellow-400',
                Hard: 'bg-red-900/30 text-red-400'
            };

            return (
                <div 
                    onClick={onClick}
                    className={`rounded-xl p-5 cursor-pointer transition-all duration-300 hover:shadow-xl hover:-translate-y-1 ${
                        darkMode 
                            ? 'bg-gray-800 hover:bg-gray-750 border border-gray-700' 
                            : 'bg-white hover:bg-gray-50 border border-gray-100 shadow-md'
                    }`}
                >
                    <div className="flex items-start justify-between mb-3">
                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${
                            darkMode ? difficultyDarkColors[game.difficulty] : difficultyColors[game.difficulty]
                        }`}>
                            {game.difficulty}
                        </span>
                        <span className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                            <i className="fas fa-users mr-1"></i>{game.ageGroup}
                        </span>
                    </div>

                    <h3 className={`text-lg font-bold mb-2 ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                        {game.title}
                    </h3>

                    <p className={`text-sm mb-3 line-clamp-2 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                        {game.description}
                    </p>

                    <div className={`flex flex-wrap gap-1.5 mb-3`}>
                        {game.materials.slice(0, 3).map((material, idx) => (
                            <span 
                                key={idx}
                                className={`px-2 py-1 rounded text-xs ${
                                    darkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-600'
                                }`}
                            >
                                <i className="fas fa-cube mr-1 text-xs"></i>{material}
                            </span>
                        ))}
                        {game.materials.length > 3 && (
                            <span className={`px-2 py-1 rounded text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                                +{game.materials.length - 3} more
                            </span>
                        )}
                    </div>

                    <div className={`pt-3 border-t flex items-center justify-between ${
                        darkMode ? 'border-gray-700' : 'border-gray-100'
                    }`}>
                        <span className={`text-xs font-medium px-2 py-1 rounded ${
                            darkMode ? 'bg-blue-900/30 text-blue-400' : 'bg-blue-50 text-blue-600'
                        }`}>
                            {game.category}
                        </span>
                        <span className={`text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                            <i className="fas fa-arrow-right ml-1"></i>View Details
                        </span>
                    </div>
                </div>
            );
        }

        // Game Detail Modal Component
        function GameDetailModal({ game, darkMode, onClose }) {
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onClick={onClose}>
                    <div 
                        className={`max-w-3xl w-full max-h-[90vh] overflow-y-auto rounded-2xl shadow-2xl ${
                            darkMode ? 'bg-gray-800' : 'bg-white'
                        }`} 
                        onClick={(e) => e.stopPropagation()}
                    >
                        {/* Header */}
                        <div className={`sticky top-0 p-6 border-b ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                            <div className="flex items-start justify-between">
                                <div>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${
                                            game.difficulty === 'Easy' ? 'bg-green-100 text-green-800' :
                                            game.difficulty === 'Medium' ? 'bg-yellow-100 text-yellow-800' :
                                            'bg-red-100 text-red-800'
                                        }`}>
                                            {game.difficulty}
                                        </span>
                                        <span className={`px-3 py-1 rounded-full text-xs ${
                                            darkMode ? 'bg-blue-900/30 text-blue-400' : 'bg-blue-50 text-blue-600'
                                        }`}>
                                            {game.category}
                                        </span>
                                    </div>
                                    <h2 className={`text-2xl font-bold ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                        {game.title}
                                    </h2>
                                    <p className={`mt-1 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                                        <i className="fas fa-child mr-2"></i>Ages: {game.ageGroup}
                                    </p>
                                </div>
                                <button 
                                    onClick={onClose}
                                    className={`p-2 rounded-full transition-colors ${
                                        darkMode ? 'hover:bg-gray-700 text-gray-400' : 'hover:bg-gray-100 text-gray-500'
                                    }`}
                                >
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                            </div>
                        </div>

                        {/* Content */}
                        <div className="p-6 space-y-6">
                            {/* Description */}
                            <section>
                                <h3 className={`text-lg font-bold mb-2 flex items-center ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                    <i className="fas fa-info-circle mr-2 text-blue-500"></i>Description
                                </h3>
                                <p className={`${darkMode ? 'text-gray-300' : 'text-gray-600'} leading-relaxed`}>
                                    {game.description}
                                </p>
                            </section>

                            {/* Materials */}
                            <section>
                                <h3 className={`text-lg font-bold mb-3 flex items-center ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                    <i className="fas fa-box mr-2 text-purple-500"></i>Materials Needed
                                </h3>
                                <div className="flex flex-wrap gap-2">
                                    {game.materials.map((material, idx) => (
                                        <span 
                                            key={idx}
                                            className={`px-4 py-2 rounded-lg text-sm font-medium ${
                                                darkMode ? 'bg-gray-700 text-gray-200' : 'bg-gray-100 text-gray-700'
                                            }`}
                                        >
                                            <i className="fas fa-check-circle mr-2 text-green-500"></i>{material}
                                        </span>
                                    ))}
                                </div>
                            </section>

                            {/* Instructions */}
                            <section>
                                <h3 className={`text-lg font-bold mb-3 flex items-center ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                    <i className="fas fa-list-ol mr-2 text-orange-500"></i>Instructions
                                </h3>
                                <ol className="space-y-3">
                                    {game.steps.map((step, idx) => (
                                        <li key={idx} className="flex gap-3">
                                            <span className={`flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold ${
                                                darkMode ? 'bg-blue-600 text-white' : 'bg-blue-500 text-white'
                                            }`}>
                                                {idx + 1}
                                            </span>
                                            <span className={`pt-0.5 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                                {step}
                                            </span>
                                        </li>
                                    ))}
                                </ol>
                            </section>

                            {/* Action Buttons */}
                            <div className="flex gap-3 pt-4">
                                <button className={`flex-1 py-3 rounded-xl font-semibold transition-all ${
                                    darkMode 
                                        ? 'bg-blue-600 hover:bg-blue-700 text-white' 
                                        : 'bg-blue-500 hover:bg-blue-600 text-white'
                                }`}>
                                    <i className="fas fa-bookmark mr-2"></i>Save Game
                                </button>
                                <button className={`flex-1 py-3 rounded-xl font-semibold transition-all ${
                                    darkMode 
                                        ? 'bg-gray-700 hover:bg-gray-600 text-white' 
                                        : 'bg-gray-200 hover:bg-gray-300 text-gray-800'
                                }`}>
                                    <i className="fas fa-share-alt mr-2"></i>Share
                                </button>
                                <button className={`px-6 py-3 rounded-xl font-semibold transition-all ${
                                    darkMode 
                                        ? 'bg-gray-700 hover:bg-gray-600 text-white' 
                                        : 'bg-gray-200 hover:bg-gray-300 text-gray-800'
                                }`}>
                                    <i className="fas fa-print"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Offline Modal Component
        function OfflineModal({ darkMode, onClose, totalGames }) {
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onClick={onClose}>
                    <div 
                        className={`max-w-lg w-full rounded-2xl shadow-2xl p-8 ${
                            darkMode ? 'bg-gray-800' : 'bg-white'
                        }`} 
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div className="text-center">
                            <div className={`w-20 h-20 mx-auto mb-6 rounded-full flex items-center justify-center ${
                                darkMode ? 'bg-green-900/30' : 'bg-green-100'
                            }`}>
                                <i className="fas fa-download text-4xl text-green-500"></i>
                            </div>

                            <h2 className={`text-2xl font-bold mb-2 ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                Games Available Offline
                            </h2>
                            
                            <p className={`mb-6 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                All {totalGames.toLocaleString()} games are now stored locally in your browser. 
                                You can access them anytime without internet connection.
                            </p>

                            <div className={`rounded-xl p-4 mb-6 ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                <div className="grid grid-cols-2 gap-4 text-left">
                                    <div>
                                        <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Total Games</p>
                                        <p className={`text-2xl font-bold ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                            {totalGames.toLocaleString()}
                                        </p>
                                    </div>
                                    <div>
                                        <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Categories</p>
                                        <p className={`text-2xl font-bold ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                            {CATEGORIES.length - 1}
                                        </p>
                                    </div>
                                    <div>
                                        <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Storage Used</p>
                                        <p className={`text-2xl font-bold text-green-500`}>
                                            Local Cache
                                        </p>
                                    </div>
                                    <div>
                                        <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Status</p>
                                        <p className={`text-2xl font-bold text-green-500`}>
                                            <i className="fas fa-check-circle mr-1"></i>Ready
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <button 
                                onClick={onClose}
                                className={`w-full py-3 rounded-xl font-semibold transition-all ${
                                    darkMode 
                                        ? 'bg-green-600 hover:bg-green-700 text-white' 
                                        : 'bg-green-500 hover:bg-green-600 text-white'
                                }`}
                            >
                                <i className="fas fa-check mr-2"></i>Got It!
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.render(<ESLGamesDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
